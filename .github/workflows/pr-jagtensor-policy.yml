name: jagtensor policy

# Deterministic hub PR gates as jagtensor[bot] (linked issue, UI scope, size,
# protected paths, concurrent PR limit). Falls back to github-actions without secrets.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: jagtensor-policy-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  policy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Mint jagtensor token
        id: jagtensor
        uses: ./.github/actions/jagtensor-token
        with:
          # Prefer JAGTENSOR_*; accept legacy JAGUAR_* until secrets are renamed
          app-id: ${{ secrets.JAGTENSOR_APP_ID || secrets.JAGUAR_APP_ID }}
          private-key: ${{ secrets.JAGTENSOR_APP_PRIVATE_KEY || secrets.JAGUAR_APP_PRIVATE_KEY }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run jagtensor policy
        env:
          GH_TOKEN: ${{ steps.jagtensor.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/pr-jagtensor-policy.mjs --pr "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --write | tee jagtensor-policy.json

      - name: Job summary
        run: |
          {
            echo '## jagtensor policy'
            echo "Identity: \`${{ steps.jagtensor.outputs.identity }}\`"
            echo '```json'
            cat jagtensor-policy.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
