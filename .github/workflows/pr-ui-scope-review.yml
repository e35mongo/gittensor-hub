name: PR UI scope review

# Flags unrelated UI work: UI file changes outside the linked issue's scope
# (e.g. backend/docs wanted issue), missing frontend label, or UI without an issue.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-ui-scope-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ui-scope:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Review UI scope
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/pr-ui-scope-review.mjs --pr "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --write | tee ui-scope.json

      - name: Job summary
        run: |
          {
            echo '## PR UI scope review'
            echo '```json'
            cat ui-scope.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
