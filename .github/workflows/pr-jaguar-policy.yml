name: jaguar policy

# Deterministic hub PR gates as jaguar[bot] (linked issue, UI scope, size,
# protected paths, concurrent PR limit). Falls back to github-actions without secrets.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: jaguar-policy-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  policy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Mint jaguar token
        id: jaguar
        uses: ./.github/actions/jaguar-token
        with:
          app-id: ${{ secrets.JAGUAR_APP_ID }}
          private-key: ${{ secrets.JAGUAR_APP_PRIVATE_KEY }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run jaguar policy
        env:
          GH_TOKEN: ${{ steps.jaguar.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/pr-jaguar-policy.mjs --pr "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --write | tee jaguar-policy.json

      - name: Job summary
        run: |
          {
            echo '## jaguar policy'
            echo "Identity: \`${{ steps.jaguar.outputs.identity }}\`"
            echo '```json'
            cat jaguar-policy.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
