name: Mint jagtensor GitHub App token
description: >
  Create an installation access token for the jagtensor GitHub App when secrets
  are configured; otherwise fall back to github.token (comments as github-actions).

inputs:
  app-id:
    description: Jagtensor GitHub App ID (falls back to JAGUAR_APP_ID in caller if needed)
    required: false
    default: ""
  private-key:
    description: Jagtensor GitHub App private key (PEM)
    required: false
    default: ""

outputs:
  token:
    description: Token to use as GH_TOKEN
    value: ${{ steps.pick.outputs.token }}
  identity:
    description: jagtensor | github-actions
    value: ${{ steps.pick.outputs.identity }}

runs:
  using: composite
  steps:
    - name: Create jagtensor app token
      id: mint
      if: ${{ inputs.app-id != '' && inputs.private-key != '' }}
      uses: actions/create-github-app-token@v2
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.private-key }}

    - name: Select token
      id: pick
      shell: bash
      env:
        APP_TOKEN: ${{ steps.mint.outputs.token }}
        FALLBACK: ${{ github.token }}
      run: |
        set -euo pipefail
        if [ -n "${APP_TOKEN:-}" ]; then
          echo "token=${APP_TOKEN}" >> "$GITHUB_OUTPUT"
          echo "identity=jagtensor" >> "$GITHUB_OUTPUT"
          echo "Using jagtensor GitHub App token."
        else
          echo "token=${FALLBACK}" >> "$GITHUB_OUTPUT"
          echo "identity=github-actions" >> "$GITHUB_OUTPUT"
          echo "JAGTENSOR_APP_ID / JAGTENSOR_APP_PRIVATE_KEY not set — falling back to github.token."
        fi
