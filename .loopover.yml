# LoopOver (ex-Gittensory) config for gittensor-hub.
# Install/self-host the LoopOver GitHub App, then this file shapes the gate.
# Docs: https://loopover.ai/docs/github-app · https://github.com/JSONbored/loopover
#
# Hub is a Next.js product repo (not a registry content lane). Prefer advisory
# gates first; promote to block after the install is healthy.

# Paths safe for narrow, auto-adjudicable community data PRs (if any).
# Most hub work is code — keep this tight so UI/backend never auto-merges.
wantedPaths:
  - "docs/**"
  - ".github/wanted-backlog.json"
  - "content/chat/**"
  - "docs/chat/**"

# Any match → not a community-data submission; hold for human / jagtensor policy bots.
blockedPaths:
  - "*"
  - ".*"
  - "src/**"
  - "scripts/**"
  - "public/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "next.config.js"
  - "tsconfig.json"
  - "eslint.config.mjs"
  - ".github/workflows/**"
  - ".github/actions/**"

gate:
  # Let high-confidence AI blockers survive into the gate (semantic defects).
  aiJudgmentBlockers: gate
  enabled: true
  linkedIssue: advisory
  duplicates: block
  readiness:
    mode: advisory
    minScore: 60

settings:
  reviewCheckMode: visible
  checkRunMode: enabled
  checkRunDetailLevel: standard
  commentMode: all_prs
  includeMaintainerAuthors: true
  reviewEvasionProtection: close

  # Inherit gittensor:* type labels from the linked issue onto the PR.
  linkedIssueLabelPropagation:
    enabled: true
    mode: exclusive_type_label
    mappings:
      - issueLabel: "gittensor:bug"
        prLabel: "gittensor:bug"
        removeOtherTypeLabels: true
        trustMaintainerAuthoredIssue: true
      - issueLabel: "gittensor:feature"
        prLabel: "gittensor:feature"
        removeOtherTypeLabels: true
        trustMaintainerAuthoredIssue: true
      - issueLabel: "gittensor:priority"
        prLabel: "gittensor:priority"
        removeOtherTypeLabels: true

review:
  note: "Link an open gittensor-hub:wanted issue. UI changes require the frontend label + a screenshot. Unrelated UI on backend/docs issues will be flagged."
  footer:
    text: "Reviewed with LoopOver · hub policy also enforced by jagtensor Actions bots."
